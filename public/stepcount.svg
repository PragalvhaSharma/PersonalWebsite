<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Step Count Changer">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%" stop-color="#0c1a15"/>
      <stop offset="100%" stop-color="#030705"/>
    </radialGradient>
    <linearGradient id="ringMove" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3CF2B2"/>
      <stop offset="100%" stop-color="#0fae7a"/>
    </linearGradient>
    <linearGradient id="ringEx" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ringStand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3CF2B2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3CF2B2" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g transform="translate(600 400)">
    <circle r="240" fill="none" stroke="#3CF2B2" stroke-opacity="0.09" stroke-width="44"/>
    <circle r="240" fill="none" stroke="url(#ringMove)" stroke-width="44" stroke-linecap="round"
            stroke-dasharray="1480 1510" transform="rotate(-90)"/>

    <circle r="180" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="40"/>
    <circle r="180" fill="none" stroke="url(#ringEx)" stroke-width="40" stroke-linecap="round"
            stroke-dasharray="980 1131" transform="rotate(-90)"/>

    <circle r="120" fill="none" stroke="#3CF2B2" stroke-opacity="0.10" stroke-width="36"/>
    <circle r="120" fill="none" stroke="url(#ringStand)" stroke-width="36" stroke-linecap="round"
            stroke-dasharray="640 754" transform="rotate(-90)"/>
  </g>
</svg>
